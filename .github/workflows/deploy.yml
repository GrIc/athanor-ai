name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: athanor-ai

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve
        env:
          TF_VAR_project_id: athanor-ai
          TF_VAR_gcp_region: europe-west9
          TF_VAR_openrouter_api_key: ${{ secrets.TF_VAR_OPENROUTER_API_KEY }}
          TF_VAR_webui_secret_key: ${{ secrets.TF_VAR_WEBUI_SECRET_KEY }}
          TF_VAR_vertexai_proxy_api_key: ${{ secrets.TF_VAR_VERTEXAI_PROXY_API_KEY }}
          TF_VAR_gcp_billing_account_name: ${{ secrets.TF_VAR_GCP_BILLING_ACCOUNT_NAME }}
