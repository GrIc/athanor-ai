name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: athanor-ai

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform -chdir=infra init

      # One-time migration: remove repo-level AR IAM bindings from state (replaced by project-level).
      # The CI/CD SA cannot call setIamPolicy on the AR repo, so Terraform cannot destroy them.
      # Removing from state leaves the bindings in GCP (harmless) and unblocks the apply.
      - name: Migrate AR IAM state (repo-level → project-level)
        run: |
          terraform -chdir=infra state rm \
            google_artifact_registry_repository_iam_member.cloudrun_agent_ar_access \
            google_artifact_registry_repository_iam_member.openwebui_ar_access \
            2>/dev/null || true

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve
        env:
          TF_VAR_project_id: athanor-ai
          TF_VAR_gcp_region: europe-west9
          TF_VAR_openrouter_api_key: ${{ secrets.TF_VAR_OPENROUTER_API_KEY }}
          TF_VAR_webui_secret_key: ${{ secrets.TF_VAR_WEBUI_SECRET_KEY }}
          TF_VAR_vertexai_proxy_api_key: ${{ secrets.TF_VAR_VERTEXAI_PROXY_API_KEY }}
          TF_VAR_gcp_billing_account_id: ${{ secrets.TF_VAR_GCP_BILLING_ACCOUNT_ID }}
          TF_VAR_smtp_user: ${{ secrets.TF_VAR_SMTP_USER }}
          TF_VAR_smtp_password: ${{ secrets.TF_VAR_SMTP_PASSWORD }}
          TF_VAR_monitored_user_emails: ${{ secrets.TF_VAR_MONITORED_USER_EMAILS }}
          TF_VAR_parent_alert_email: ${{ secrets.TF_VAR_PARENT_ALERT_EMAIL }}
          TF_VAR_default_weekly_budget_eur: ${{ secrets.TF_VAR_DEFAULT_WEEKLY_BUDGET_EUR }}
          TF_VAR_default_daily_budget_eur: ${{ secrets.TF_VAR_DEFAULT_DAILY_BUDGET_EUR }}
          TF_VAR_user_budget_overrides_json: ${{ secrets.TF_VAR_USER_BUDGET_OVERRIDES_JSON }}
          TF_VAR_budget_block_on_exceeded: ${{ secrets.TF_VAR_BUDGET_BLOCK_ON_EXCEEDED }}
